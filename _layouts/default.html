<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Stellar Chaos</title>
    <meta name="description" content="{{ page.description | default: 'Stellar Chaos - Borzoi kennel in Oulu, Finland' }}">

    <!-- Open Graph / social media preview -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Stellar Chaos">
    <meta property="og:title" content="{{ page.title }} | Stellar Chaos">
    <meta property="og:description" content="{{ page.description | default: 'Stellar Chaos - Borzoi kennel in Oulu, Finland' }}">
    <meta property="og:image" content="https://stellarchaos.fi/img/social-preview.png">
    <meta property="og:url" content="https://stellarchaos.fi{{ page.url }}">

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://stellarchaos.fi/img/social-preview.jpg">
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="page-container">
    <div id="content-wrap">
      {% include navbar.html %}
      {{ content }}
    </div>
    {% include footer.html %}
  </div>
  <script src="https://cdn.counter.dev/script.js" data-id="351ca86c-d7df-47c3-a7f2-e04becd5f829" data-utcoffset="2"></script>
</body>
</html>
